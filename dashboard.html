<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPro Local - Dashboard de Leads</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 8px; margin-bottom: 30px; }
        header h1 { font-size: 2em; margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #667eea; margin-bottom: 10px; font-size: 0.9em; text-transform: uppercase; }
        .stat-number { font-size: 2.5em; font-weight: bold; color: #333; }
        .leads-section { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .leads-section h2 { margin-bottom: 20px; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        table th { background: #f0f0f0; padding: 12px; text-align: left; font-weight: 600; color: #333; }
        table td { padding: 12px; border-bottom: 1px solid #eee; }
        table tr:hover { background: #f9f9f9; }
        .service-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .service-electricista { background: #FFF3E0; color: #FF6B35; }
        .service-plomero { background: #E6F2FF; color: #0066CC; }
        .service-inmobiliario { background: #F0F7E8; color: #2D5016; }
        .export-btn { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        .export-btn:hover { background: #764ba2; }
        .filters { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: white; }
        .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 WebPro Local - Dashboard</h1>
            <p>Control en tiempo real de leads y conversiones</p>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total de Leads</h3>
                <div class="stat-number" id="total-leads">0</div>
            </div>
            <div class="stat-card">
                <h3>Electricistas</h3>
                <div class="stat-number" id="electricista-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Plomeros</h3>
                <div class="stat-number" id="plomero-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Inmobiliarios</h3>
                <div class="stat-number" id="inmobiliario-count">0</div>
            </div>
        </div>
        
        <div class="leads-section">
            <h2>Leads capturados</h2>
            
            <div class="filters">
                <button class="filter-btn active" onclick="filterLeads('all')">Todos</button>
                <button class="filter-btn" onclick="filterLeads('electricista')">⚡ Electricistas</button>
                <button class="filter-btn" onclick="filterLeads('plomero')">🔧 Plomeros</button>
                <button class="filter-btn" onclick="filterLeads('inmobiliario')">🏠 Inmobiliarios</button>
                <button class="export-btn" onclick="exportToCSV()">📥 Exportar CSV</button>
            </div>
            
            <table id="leads-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Servicio</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    <tr><td colspan="4" style="text-align: center; color: #999;">Cargando leads...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let allLeads = [];
        let currentFilter = 'all';
        
        // Load leads from server
        async function loadLeads() {
            try {
                const response = await fetch('/api/leads');
                allLeads = await response.json() || [];
                updateStats();
                displayLeads();
            } catch (error) {
                console.error('Error loading leads:', error);
                document.getElementById('leads-body').innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">Error loading leads</td></tr>';
            }
        }
        
        function updateStats() {
            const total = allLeads.length;
            const electricista = allLeads.filter(l => l.service === 'electricista').length;
            const plomero = allLeads.filter(l => l.service === 'plomero').length;
            const inmobiliario = allLeads.filter(l => l.service === 'inmobiliario').length;
            
            document.getElementById('total-leads').textContent = total;
            document.getElementById('electricista-count').textContent = electricista;
            document.getElementById('plomero-count').textContent = plomero;
            document.getElementById('inmobiliario-count').textContent = inmobiliario;
        }
        
        function displayLeads() {
            let filtered = currentFilter === 'all' 
                ? allLeads 
                : allLeads.filter(l => l.service === currentFilter);
            
            const tbody = document.getElementById('leads-body');
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999;">No hay leads</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(lead => `
                <tr>
                    <td>${lead.name}</td>
                    <td>${lead.email}</td>
                    <td><span class="service-badge service-${lead.service}">${lead.service}</span></td>
                    <td>${new Date(lead.timestamp).toLocaleDateString('es-ES')}</td>
                </tr>
            `).join('');
        }
        
        function filterLeads(service) {
            currentFilter = service;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            displayLeads();
        }
        
        function exportToCSV() {
            let csv = 'Nombre,Email,Servicio,Fecha\n';
            allLeads.forEach(lead => {
                csv += `"${lead.name}","${lead.email}","${lead.service}","${new Date(lead.timestamp).toLocaleDateString('es-ES')}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `webpro-leads-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
        
        // Load leads on page load
        loadLeads();
        
        // Refresh every 30 seconds
        setInterval(loadLeads, 30000);
    </script>
</body>
</html>
